<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Landing Page</title>
    <style>
        
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --card-bg: #adb0ff;
            --accent-color: #1b0091;
            --error-color: #dc3545;
        }

       
        body.dark {
            --bg-color: #1e1e1e;
            --text-color: #f5f5f5;
            --card-bg: #2d2d2d;
            --accent-color: #17a2b8;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s, color 0.3s;
        }

      

            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .section-card {
            background-color: var(--card-bg);
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        button.secondary {
            background-color: #6c757d;
            margin-left: 0.5rem;
        }

        
        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

       
        .error-message {
            color: var(--error-color);
            font-size: 0.85rem;
            margin-top: 0.25rem;
            display: none;
        }
    </style>
</head>
<body>

       
        <button id="themeToggle">Switch to Dark Mode</button>
    </nav>

    <main>
       
        <header>
            <h1>Personal Details Form</h1>
        </header>

        
        <section class="section-card">
            <h2> | Click Counter| </h2>
            <p>Current Count: <strong id="counterDisplay">0</strong></p>
            <button id="incrementBtn">Click Me</button>
            <button id="resetBtn" class="secondary">Reset</button>
        </section>

       
        <section class="section-card">
            <h2> | Form Validation| </h2>
            <form id="landingForm" novalidate>
                <div class="form-group">
                    <label for="nameInput">Name</label>
                    <input type="text" id="nameInput" placeholder="Enter your name">
                    <div id="nameError" class="error-message">Name cannot be empty.</div>
                </div>
                
                <div class="form-group">
                    <label for="emailInput">Email Address</label>
                    <input type="email" id="emailInput" placeholder="name@example.com">
                    <div id="emailError" class="error-message">Please enter a valid email containing '@'.</div>
                </div>

                <div class="form-group">
                    <label for="contactNumberInput">Contact Number</label>
                    <input type="Contact" id="ContanctNumberInput" placeholder="Enter your contact number">
                    <div id="Contact" class="error-message">contact cannot be empty.</div>
                    
                </div>

                <label for="age">Select your age:</label>

<select id="age" name="age">
  <option value="">-- Choose Age --</option>

  <option value="1">1-14</option>
  <option value="2">15-30</option>
  <option value="3">31-45</option>
  <option value="4">46+</option>
</select>
<div id="ageError" class="error-message">Please select a value.</div>

<label for="hobby">Enter your hobby:</label>
<input type="text" id="hobby" name="hobby" placeholder="e.g. Reading, Football, Drawing">
<div id="hobbyError" class="error-message">Please select a value.</div>

                <button type="submit">Submit Registration</button>
            </form>
        </section>
    </main>

    <!-- JavaScript Logic -->
    <script>
       
        const themeToggle = document.getElementById('themeToggle');
        
        themeToggle.addEventListener('click', () => {
           
            document.body.classList.toggle('dark');
           
            if (document.body.classList.contains('dark')) {
                themeToggle.textContent = 'Switch to Light Mode';
            } else {
                themeToggle.textContent = 'Switch to Dark Mode';
            }
        });

       
        let count = 0;
        const counterDisplay = document.getElementById('counterDisplay');
        const incrementBtn = document.getElementById('incrementBtn');
        const resetBtn = document.getElementById('resetBtn');

        incrementBtn.addEventListener('click', () => {
            count++;
            counterDisplay.textContent = count;
        });

        resetBtn.addEventListener('click', () => {
            count = 0;
            counterDisplay.textContent = count;
        });

  
        const landingForm = document.getElementById('landingForm');
        const nameInput = document.getElementById('nameInput');
    
        
        
        const nameError = document.getElementById('nameError');
        const emailError = document.getElementById('emailError');
    

        landingForm.addEventListener('submit', (event) => {
           
            event.preventDefault();
            
            let isValid = true;

            
            if (nameInput.value.trim() === "") {
                nameError.style.display = 'block';
                isValid = false;
            } else {
                nameError.style.display = 'none';
            }

          
            if (!emailInput.value.includes('@')) {
                emailError.style.display = 'block';
                isValid = false;
            } else {
                emailError.style.display = 'none';
            }
         if (isValid) {
              
                landingForm.reset();
            }
        });
    </script>
</body>
</html>
