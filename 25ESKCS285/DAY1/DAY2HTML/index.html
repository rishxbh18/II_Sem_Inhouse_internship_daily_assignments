<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Admission Form</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#111849;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            width:700px;
            background:rgb(69, 180, 224);
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#ffffff;
            margin-bottom:20px;
        }

        .form-group{
            margin-bottom:15px;
      
        button{
            width:100%;
            padding:12px;
            background:#101b3f;
            color:rgb(255, 255, 255);
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#1e1546;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>College Admission Form</h1>

    <form>
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your full name" required>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" placeholder="Enter phone number" required>
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" required>
            </div>

            <div class="form-group">
                <label>Gender</label>
                <select required>
                    <option value="">Select</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>State</label>
            <textarea rows="1" placeholder="Enter your State" required></textarea>
        </div>

        <div class="form-group">
            <label>city</label>
            <textarea rows="1" placeholder="Enter your city" required></textarea>
        </div>


        <div class="row">
            <div class="form-group">
                <label>Course</label>
                <select required>
                    <option value="">Select Course</option>
                    <option>BCA</option>
                    <option>B.Tech</option>
                    <option>BBA</option>
                    <option>B.Com</option>
                    <option>BA</option>
                </select>
            </div>

            <div class="form-group">
                <label>Percentage% (10th)</label>
                <input type="number" placeholder="Enter percentage" required>
            </div>
             <div class="form-group">
                <label>Percentage% (12th)</label>
                <input type="number" placeholder="Enter percentage" required>
            </div>
        </div>

        <div class="form-group">
            <label>Upload Documents(adhar card/school ID/any other official ID proof)</label>
            <input type="file" required>
        </div>

        <button type="submit">Submit Application</button>
    </form>
</div>

</body>
</html>
